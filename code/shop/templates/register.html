{% extends 'base.html' %}
{% block title %}РЕГИСТРАЦИЯ — DENIS{% endblock %}

{% block extra_styles %}
<style>
    .auth-section {
        min-height: calc(100vh - 64px - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        background: rgb(13, 13, 13);
    }
    .auth-wrap {
        width: 100%;
        max-width: 420px;
    }
    .auth-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        color: rgb(237, 237, 237);
        letter-spacing: 0.06em;
        margin-bottom: 40px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        color: rgba(237,237,237,0.5);
        margin-bottom: 10px;
    }
    .form-group input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgb(237, 237, 237);
        color: rgb(237, 237, 237);
        font-size: 0.95rem;
        padding: 10px 0;
        outline: none;
        font-family: inherit;
        transition: border-color 0.2s;
    }
    .form-group input::placeholder { color: rgba(237,237,237,0.25); }
    .form-group input:focus { border-color: rgb(237, 237, 237); }
    .form-group small {
        display: block;
        margin-top: 8px;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        color: rgba(237,237,237,0.3);
    }
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: rgb(237, 237, 237);
        color: rgb(13, 13, 13);
        border: 1px solid rgb(237, 237, 237);
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        cursor: pointer;
        margin-top: 12px;
        transition: background 0.15s, color 0.15s;
    }
    .btn-submit:hover {
        background: transparent;
        color: rgb(237, 237, 237);
    }
    .auth-footer {
        margin-top: 28px;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        color: rgba(237,237,237,0.4);
    }
    .auth-footer a {
        color: rgb(237, 237, 237);
        border-bottom: 1px solid rgba(237,237,237,0.4);
        padding-bottom: 1px;
    }
    .auth-footer a:hover { border-color: rgb(237,237,237); }
</style>
{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-wrap">
        <h1 class="auth-title">РЕГИСТРАЦИЯ</h1>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="name">ИМЯ</label>
                <input type="text" id="name" name="name" required placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label for="password">ПАРОЛЬ</label>
                <input type="password" id="password" name="password" required minlength="8">
                <small>Минимум 8 символов, заглавная буква, цифра, спецсимвол</small>
            </div>
            <div class="form-group">
                <label for="confirm_password">ПОДТВЕРДИТЕ ПАРОЛЬ</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn-submit">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        </form>
        <div class="auth-footer">
            Уже есть аккаунт? <a href="{{ url_for('login') }}">ВОЙТИ</a>
        </div>
    </div>
</div>
{% endblock %}
