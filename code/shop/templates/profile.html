{% extends 'base.html' %}
{% block title %}ПРОФИЛЬ — DENIS{% endblock %}

{% block extra_styles %}
<style>
    .profile-section {
        min-height: calc(100vh - 64px - 200px);
        background: rgb(13, 13, 13);
        padding: 64px 40px;
    }
    .profile-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        color: rgb(237, 237, 237);
        letter-spacing: 0.06em;
        margin-bottom: 48px;
    }
    .profile-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        max-width: 700px;
        border: 1px solid rgb(237, 237, 237);
    }
    @media (max-width: 600px) { .profile-grid { grid-template-columns: 1fr; } }

    .profile-cell {
        padding: 24px 28px;
        border-bottom: 1px solid rgb(237, 237, 237);
    }
    .profile-cell:nth-last-child(-n+2) { border-bottom: none; }
    .profile-cell-label {
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        color: rgba(237,237,237,0.4);
        margin-bottom: 10px;
    }
    .profile-cell-value {
        font-size: 0.95rem;
        color: rgb(237, 237, 237);
        letter-spacing: 0.04em;
    }
    .profile-cell:nth-child(odd) {
        border-right: 1px solid rgb(237, 237, 237);
    }

    .profile-actions {
        display: flex;
        gap: 12px;
        margin-top: 40px;
    }
    .btn-catalog {
        padding: 13px 28px;
        background: rgb(237, 237, 237);
        color: rgb(13, 13, 13);
        border: 1px solid rgb(237, 237, 237);
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background 0.15s, color 0.15s;
    }
    .btn-catalog:hover {
        background: transparent;
        color: rgb(237, 237, 237);
    }
    .btn-logout {
        padding: 13px 28px;
        background: transparent;
        color: rgb(237, 237, 237);
        border: 1px solid rgb(237, 237, 237);
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background 0.15s, color 0.15s;
    }
    .btn-logout:hover {
        background: rgb(237, 237, 237);
        color: rgb(13, 13, 13);
    }
</style>
{% endblock %}

{% block content %}
<div class="profile-section">
    <h1 class="profile-title">ЛИЧНЫЙ КАБИНЕТ</h1>

    <div class="profile-grid">
        <div class="profile-cell">
            <div class="profile-cell-label">ИМЯ</div>
            <div class="profile-cell-value">{{ current_user.name }}</div>
        </div>
        <div class="profile-cell">
            <div class="profile-cell-label">EMAIL</div>
            <div class="profile-cell-value">{{ current_user.email }}</div>
        </div>
        <div class="profile-cell">
            <div class="profile-cell-label">АДРЕС</div>
            <div class="profile-cell-value">{{ current_user.address or '—' }}</div>
        </div>
        <div class="profile-cell">
            <div class="profile-cell-label">СТАТУС</div>
            <div class="profile-cell-value">АКТИВЕН</div>
        </div>
    </div>

    <div class="profile-actions">
        <a href="{{ url_for('index') }}" class="btn-catalog">В КАТАЛОГ</a>
        <a href="{{ url_for('logout') }}" class="btn-logout">ВЫЙТИ</a>
    </div>
</div>
{% endblock %}
