<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category.name }}</title>
</head>
<body>
    <h1>{{ category.name }}</h1>
    
    <h2>Товары</h2>
    <ul>
        {% for product in products %}
            <li>
                {{ product.name }} - {{ product.price }} руб.
            </li>
        {% endfor %}
    </ul>

    <br>
    <a href="{{ url_for('index') }}">Назад</a>
</body>
</html>
